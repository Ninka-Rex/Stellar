app-id: io.github.stellar.Stellar
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk
command: Stellar

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    version: '23.08'
    add-ld-path: .
    autodownload: true
    no-autodownload: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  # Home access for user-chosen download directories
  - --filesystem=home
  # "Show in Folder" — open file manager
  - --talk-name=org.freedesktop.FileManager1
  # System tray / StatusNotifier
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: Stellar
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: dir
        path: ../..
    post-install:
      - mkdir -p /app/lib/ffmpeg
      - install -Dm644 packaging/flatpak/io.github.stellar.Stellar.desktop
          /app/share/applications/io.github.stellar.Stellar.desktop
      - install -Dm644 packaging/flatpak/io.github.stellar.Stellar.metainfo.xml
          /app/share/metainfo/io.github.stellar.Stellar.metainfo.xml
      # Application icon — PNG required by appstreamcli
      - install -Dm644 app/qml/icons/milky-way.png
          /app/share/icons/hicolor/256x256/apps/io.github.stellar.Stellar.png
      - install -Dm644 app/qml/icons/milky-way.png
          /app/share/icons/hicolor/128x128/apps/io.github.stellar.Stellar.png
      # Native messaging host manifest for Firefox (Linux path)
      - install -Dm644 packaging/linux/com.stellar.downloadmanager.json
          /app/lib/mozilla/native-messaging-hosts/com.stellar.downloadmanager.json
